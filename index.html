<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group 13 Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <div id="setup-container">
            <h3>Enter Your Name</h3>
            <input type="text" id="username" placeholder="Type name here...">
            <button onclick="startQuiz()">Start Quiz</button>
        </div>

        <div id="quiz-box" style="display: none;">
            <h2 id="question">Question loading...</h2>
            <div id="answer-buttons"></div>
            <button id="next-btn" class="next-btn" style="display: none;">Next Question</button>
        </div>

        <div id="score-container" style="display: none;">
            <h2 id="greeting-text"></h2>
            <p id="score-display"></p>
            <button onclick="location.reload()">Restart</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
